name: Release build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Check release trigger
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.release.outputs.should_build }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            echo "Version must use x.y.z-alpha.n while the app is alpha. Current: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Decide whether to build
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "$COMMIT_MESSAGE" != \[RELEASE\]* ]]; then
            echo "Release build skipped: commit message does not start with [RELEASE]."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || true)
          if [[ "$latest_tag" == "$CURRENT_TAG" ]]; then
            echo "Release build skipped: $CURRENT_TAG is already the latest release."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_build=true" >> "$GITHUB_OUTPUT"

  fast-checks:
    name: Fast checks
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fast frontend tests
        run: npm run test:run

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

  build-windows:
    name: Build Windows release
    needs: [prepare, fast-checks]
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and publish GitHub release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: Romeu SQL ${{ needs.prepare.outputs.version }}
          releaseBody: Alpha build for Windows.
          releaseDraft: false
          prerelease: true
